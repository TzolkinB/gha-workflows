name: Dependabot Failure Comment (reusable)

on:
  workflow_call:
    inputs:
      head_branch:
        required: true
        type: string
      ci_run_url:
        required: true
        type: string

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Find open PR for this branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${{ inputs.head_branch }}`
            });
            if (pulls.length === 0) {
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            core.setOutput('number', pulls[0].number);

      - name: Comment on PR
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: '⚠️ CI failed on this PR. [View the failed run](${{ inputs.ci_run_url }}) for details.'
            });
