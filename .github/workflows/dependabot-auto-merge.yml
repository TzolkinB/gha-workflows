name: Dependabot Auto-merge (reusable)

on:
  workflow_call:
    inputs:
      head_branch:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Find open PR for this branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${{ inputs.head_branch }}`
            });
            if (pulls.length === 0) {
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            core.setOutput('number', pulls[0].number);

      - name: Squash-merge if minor-and-patch group
        if: steps.pr.outputs.found == 'true' && contains(inputs.head_branch, 'minor-and-patch')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} \
            --squash --auto --delete-branch
